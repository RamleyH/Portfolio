<!DOCTYPE html>
<html lang="en">

<head>
  <title>PVFS - Viscoelastic</title>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
  <canvas id="simCanvas"></canvas>

  <div id="overlay" style="display: none;">
    <div id="controls">
      <p id="fps">FPS: 0</p>

      <p>
        <label for="numParticles"># Particles:</label>
        <select name="numParticles" id="numParticles">
          <option value="1000">1K</option>
          <option value="2000" selected="true">2K</option>
          <option value="3000">3K</option>
          <option value="4000">4K</option>
        </select>
      </p>

      <p>
        <label for="restDensity">Rest Density:</label>
        <input type="range" name="restDensity" id="restDensity" min="0.1" max="8.0" step="0.1" value="4.0">
        <span class="sliderValue" data-for="restDensity">4.0</span>
      </p>

      <p>
        <label for="stiffness">Stiffness:</label>
        <input type="range" name="stiffness" id="stiffness" min="0.1" max="2.0" step="0.1" value="0.5">
        <span class="sliderValue" data-for="stiffness">0.5</span>
      </p>

      <p>
        <label for="nearStiffness">Near Stiffness:</label>
        <input type="range" name="nearStiffness" id="nearStiffness" min="0.1" max="2.0" step="0.1" value="0.5">
        <span class="sliderValue" data-for="nearStiffness">0.5</span>
      </p>

      <p>
        <label for="springStiffness">Spring Stiffness:</label>
        <input type="range" name="springStiffness" id="springStiffness" min="0" max="0.5" step="0.01" value="0.0">
        <span class="sliderValue" data-for="springStiffness">0.0</span>
      </p>

      <p>
        <label for="plasticity">Plasticity:</label>
        <input type="range" name="plasticity" id="plasticity" min="0.1" max="1.0" step="0.01" value="0.5">
        <span class="sliderValue" data-for="plasticity">0.5</span>
      </p>

      <p>
        <label for="yieldRatio">Yield Ratio:</label>
        <input type="range" name="yieldRatio" id="yieldRatio" min="0.1" max="1.0" step="0.01" value="0.25">
        <span class="sliderValue" data-for="yieldRatio">0.25</span>
      </p>

      <p>
        <label for="minDistRatio">Min Spring Dist Ratio:</label>
        <input type="range" name="minDistRatio" id="minDistRatio" min="0.025" max="1.0" step="0.01" value="0.25">
        <span class="sliderValue" data-for="minDistRatio">0.25</span>
      </p>

      <p>
        <label for="linViscosity">Linear Viscosity:</label>
        <input type="range" name="linViscosity" id="linViscosity" min="0.0" max="0.5" step="0.01" value="0.0">
        <span class="sliderValue" data-for="linViscosity">0.0</span>
      </p>

      <p>
        <label for="quadViscosity">Quadratic Viscosity:</label>
        <input type="range" name="quadViscosity" id="quadViscosity" min="0.0" max="0.5" step="0.01" value="0.1">
        <span class="sliderValue" data-for="quadViscosity">0.1</span>
      </p>

      <p>
        <label for="kernelRadius">Kernel Radius:</label>
        <input type="range" name="kernelRadius" id="kernelRadius" min="5.0" max="64.0" step="1.0" value="40.0">
        <span class="sliderValue" data-for="kernelRadius">40.0</span>
      </p>

      <p>
        <label for="pointSize">Point Size:</label>
        <input type="range" name="pointSize" id="pointSize" min="1" max="20" step="1" value="5">
        <span class="sliderValue" data-for="pointSize">5</span>
      </p>

      <p>
        <label for="gravX">Gravity X:</label>
        <input type="range" name="gravX" id="gravX" min="-0.5" max="0.5" step="0.01" value="0">
        <span class="sliderValue" data-for="gravX">0</span>
      </p>

      <p>
        <label for="gravY">Gravity Y:</label>
        <input type="range" name="gravY" id="gravY" min="-0.5" max="0.5" step="0.01" value="0.5">
        <span class="sliderValue" data-for="gravY">0.5</span>
      </p>

      <p>
        <label for="dt">Time Step:</label>
        <input type="range" name="dt" id="dt" min="0.1" max="1.0" step="0.1" value="1.0">
        <span class="sliderValue" data-for="dt">1.0</span>
      </p>

      <hr>

      <p>
        <label for="attractSame">Attract Same:</label>
        <input type="range" id="attractSame" min="-2" max="8" step="0.1" value="0">
        <span class="sliderValue" data-for="attractSame">0</span>
      </p>

      <p>
        <label for="attractDifferent">Attract Different:</label>
        <input type="range" id="attractDifferent" min="-2" max="8" step="0.1" value="0">
        <span class="sliderValue" data-for="attractDifferent">0</span>
      </p>

      <p>
        <label for="emitMaterial">Emit Material:</label>
        <select id="emitMaterial">
          <option value="0" selected>0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
      </p>

      <hr>

      <p>
        <strong>Materials</strong>
      </p>

      <p>
        <label for="color0">Color 0:</label>
        <input type="color" id="color0" value="#e52838">
      </p>
      <p>
        <label for="mass0">Mass 0:</label>
        <input type="range" id="mass0" min="0.1" max="3" step="0.01" value="1">
        <span class="sliderValue" data-for="mass0">1</span>
      </p>

      <p>
        <label for="color1">Color 1:</label>
        <input type="color" id="color1" value="#ffaa00">
      </p>
      <p>
        <label for="mass1">Mass 1:</label>
        <input type="range" id="mass1" min="0.1" max="3" step="0.01" value="0.6">
        <span class="sliderValue" data-for="mass1">0.6</span>
      </p>

      <p>
        <label for="color2">Color 2:</label>
        <input type="color" id="color2" value="#00e230">
      </p>
      <p>
        <label for="mass2">Mass 2:</label>
        <input type="range" id="mass2" min="0.1" max="3" step="0.01" value="0.36">
        <span class="sliderValue" data-for="mass2">0.36</span>
      </p>

      <p>
        <label for="color3">Color 3:</label>
        <input type="color" id="color3" value="#0077f2">
      </p>
      <p>
        <label for="mass3">Mass 3:</label>
        <input type="range" id="mass3" min="0.1" max="3" step="0.01" value="0.216">
        <span class="sliderValue" data-for="mass3">0.216</span>
      </p>

      <hr>

      <p>
        <button id="startButton">Start</button>
        <button id="pauseButton">Pause</button>
        <button id="stepButton">Step</button>
        <button id="resetButton">Reset</button>
      </p>

      <p>
        <small>KB: (A)ttract, (R)epel, (E)mit, (D)rain</small>
        <br>
        <small>Press 0 to toggle the UI</small>
      </p>

      <p>
        <a href="sim_3.html">Prev</a>
      </p>
    </div>

    <p>
      <button id="collapseButton">Collapse</button>
    </p>
  </div>

  <script src="metaballsRefraction.js"></script>
  <script src="fpsMonitor.js"></script>
  <script src="sim_5.js"></script>
  <script src="run_0.js"></script>

  <script>
    function updateSliderValue(slider) {
      const valueLabel = document.querySelector(`.sliderValue[data-for="${slider.id}"]`);
      if (valueLabel) {
        valueLabel.textContent = slider.value;
      }
    }

    function setupSliderValues() {
      const sliders = document.querySelectorAll('input[type="range"]');

      sliders.forEach((slider) => {
        updateSliderValue(slider);
        slider.addEventListener("input", () => {
          updateSliderValue(slider);
        });
      });
    }

    function setupOverlayToggle() {
      const overlay = document.getElementById("overlay");

      document.addEventListener("keydown", (e) => {
        if (e.key === "0") {
          if (overlay.style.display === "none") {
            overlay.style.display = "block";
          } else {
            overlay.style.display = "none";
          }
        }
      });
    }

    setupSliderValues();
    setupOverlayToggle();
  </script>
</body>

</html>
